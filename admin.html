<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ABU 2030 Transform Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--grey-100); }

    .admin-header {
      background: linear-gradient(135deg, var(--grey-800), var(--blue-900));
      color: var(--white);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .admin-header a {
      color: var(--teal-400);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .admin-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--grey-200);
    }
    .stat-card .num {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--blue-600);
    }
    .stat-card .label {
      font-size: 0.85rem;
      color: var(--grey-500);
      margin-top: 4px;
    }

    .school-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-btn {
      padding: 8px 18px;
      border: 2px solid var(--grey-200);
      border-radius: 20px;
      background: var(--white);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--grey-600);
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn:hover { border-color: var(--blue-400); }
    .filter-btn.active {
      background: var(--blue-500);
      color: var(--white);
      border-color: var(--blue-500);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .data-table th {
      background: var(--grey-100);
      padding: 12px 16px;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--grey-600);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--grey-200);
    }
    .data-table td {
      padding: 12px 16px;
      font-size: 0.88rem;
      color: var(--grey-700);
      border-bottom: 1px solid var(--grey-100);
    }
    .data-table tr:hover td {
      background: rgba(59,130,246,0.03);
    }

    .export-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .response-detail {
      background: var(--white);
      border: 1px solid var(--grey-200);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .response-detail h4 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--blue-900);
      margin-bottom: 12px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .detail-item {
      padding: 10px;
      background: var(--grey-100);
      border-radius: var(--radius-xs);
    }
    .detail-item .dlabel {
      font-size: 0.75rem;
      color: var(--grey-400);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .detail-item .dvalue {
      font-size: 1rem;
      font-weight: 700;
      color: var(--grey-800);
    }
    .freitext-box {
      margin-top: 12px;
      padding: 12px;
      background: var(--grey-100);
      border-radius: var(--radius-xs);
      font-size: 0.9rem;
      color: var(--grey-700);
      font-style: italic;
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .comparison-card {
      background: var(--white);
      border: 1px solid var(--grey-200);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }
    .comparison-card h4 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue-900);
      margin-bottom: 16px;
    }
    .comp-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .comp-label {
      flex: 0 0 120px;
      font-size: 0.82rem;
      color: var(--grey-600);
    }
    .comp-bar-wrap {
      flex: 1;
      height: 10px;
      background: var(--grey-100);
      border-radius: 5px;
      overflow: hidden;
    }
    .comp-bar {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }
    .comp-val {
      flex: 0 0 40px;
      text-align: right;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--blue-600);
    }
  </style>
</head>
<body>

<header class="admin-header">
  <div class="admin-header-inner">
    <h1>Admin Dashboard</h1>
    <a href="index.html">&larr; Zur&uuml;ck zum Guide</a>
  </div>
</header>

<div class="admin-content">
  <!-- Stats -->
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card">
      <div class="num" id="admin-total">0</div>
      <div class="label">Gesamte Einsch&auml;tzungen</div>
    </div>
    <div class="stat-card">
      <div class="num" id="admin-schools">0</div>
      <div class="label">Beteiligte Schulen</div>
    </div>
    <div class="stat-card">
      <div class="num" id="admin-avg-digital">—</div>
      <div class="label">&#216; Digitale Kultur</div>
    </div>
    <div class="stat-card">
      <div class="num" id="admin-avg-kollab">—</div>
      <div class="label">&#216; Kollaboration</div>
    </div>
  </div>

  <!-- School Filter -->
  <h3 style="margin-bottom:12px;">Schul-Filter</h3>
  <div class="school-filter" id="school-filter">
    <button class="filter-btn active" data-filter="all">Alle Schulen</button>
  </div>

  <!-- Comparison -->
  <h3 style="margin-bottom:16px;">Schulvergleich</h3>
  <div class="comparison-grid" id="comparison-grid"></div>

  <!-- Export -->
  <div class="export-bar">
    <button class="btn-primary" id="btn-export-csv">CSV Export</button>
    <button class="btn-secondary" id="btn-refresh">Daten aktualisieren</button>
  </div>

  <!-- Detail List -->
  <h3 style="margin-bottom:16px;">Einzelne Einsch&auml;tzungen</h3>
  <div id="responses-list"></div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
